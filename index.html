const lsGet = (key, fallback) => {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
};
const lsSet = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

// ================================================================
// PSYCHIC CONTEXT — distills all user data into a personal summary
// passed to every AI call so each section knows the full journey
// ================================================================
const buildPsychicContext = (dreams, shadowJournal, myArchetypes, individuationStage) => {
  const parts = [];

  // Stage
  const stage = INDIVIDUATION_STAGES[individuationStage];
  if (stage) parts.push(`FASE DI INDIVIDUAZIONE ATTUALE: ${stage.name} (${stage.short})`);

  // Archetypes
  if (myArchetypes.length > 0) {
    const archNames = myArchetypes.map(id => {
      const a = ARCHETYPES_DATA.find(x => x.id === id);
      return a ? a.name : id;
    }).join(", ");
    parts.push(`ARCHETIPI DOMINANTI RICONOSCIUTI: ${archNames}`);
  }

  // Recent dreams (last 3)
  if (dreams.length > 0) {
    const recent = dreams.slice(0, 3);
    const dreamSummaries = recent.map((d, i) =>
      `Sogno ${i+1} (${d.date}): "${d.text.slice(0, 120)}${d.text.length > 120 ? '…' : ''}" — emozioni: ${d.emotions || 'non specificate'}`
    ).join("\n");
    parts.push(`SOGNI RECENTI REGISTRATI:\n${dreamSummaries}`);
  }

  // Shadow work (last 3 entries, just themes and key phrases)
  if (shadowJournal.length > 0) {
    const recent = shadowJournal.slice(0, 3);
    const shadowSummaries = recent.map((e, i) =>
      `Lavoro ombra ${i+1} — ${e.prompt.title}: "${e.response.slice(0, 100)}${e.response.length > 100 ? '…' : ''}"`
    ).join("\n");
    parts.push(`LAVORO SULL'OMBRA RECENTE:\n${shadowSummaries}`);
  }

  if (parts.length === 0) return "";
  return `\n\n=== CONTESTO PSICHICO PERSONALE DELL'UTENTE ===\n${parts.join("\n\n")}\n=== FINE CONTESTO ===\n\nUsa questo contesto per personalizzare profondamente la tua risposta. Fai riferimento esplicito al materiale specifico dell'utente quando pertinente — sogni, temi dell'ombra, archetipi. Non essere generico: questa persona ha un percorso specifico.`;
};

const getApiKey = () => lsGet("ind_api_key", "");
const saveApiKey = (k) => lsSet("ind_api_key", k.trim());

const callClaude = async (systemPrompt, messages) => {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error("API key mancante. Tocca ◈ in alto per inserirla.");
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages,
    }),
  });
  const data = await response.json();
  if (data.type === "error") throw new Error(data.error?.message || "Errore API");
  if (!data.content?.[0]?.text) throw new Error("Risposta inattesa: " + JSON.stringify(data).slice(0, 200));
  return data.content[0].text;
};

const DREAM_SYSTEM = `Sei un analista junghiano esperto che lavora con i sogni in italiano. Analizza il sogno usando profondamente la psicologia analitica di Jung.

La tua analisi deve coprire:

**2. Livello soggettivo** — ogni elemento come aspetto del sognatore: persone, luoghi, oggetti come proiezioni della propria psiche
**3. Simboli e archetipi presenti** — identifica con precisione i simboli junghiani (Ombra, Anima/Animus, Sé, Eroe, Grande Madre, Trickster, Vecchio Saggio, ecc.) spiegando perché li riconosci
**4. Il messaggio dell'inconscio** — cosa cerca di comunicare o compensare l'inconscio attraverso questo sogno?
**5. Domanda o pratica** — una domanda aperta potente o una pratica concreta per integrare il messaggio

Scrivi con profondità psicologica, rispetto e cura. Tono caldo e diretto. Italiano. 400-520 parole.`;

const buildArchSystem = (ctx) => `Sei un analista junghiano esperto. L'utente ha identificato i propri archetipi dominanti/risonanti. Analizza la loro costellazione archetipica:

const buildImagBase = (figureSuffix, ctx) => `Sei una figura interiore nell'immaginazione attiva junghiana. Conduci un dialogo psicologico profondo.

function DreamsSection({ dreams, setDreams, tab, setTab, selectedDream, setSelectedDream, setSection }) {
  const [text, setText] = useState("");
  const [emotions, setEmotions] = useState("");
  const [dreamDate, setDreamDate] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [justAnalyzed, setJustAnalyzed] = useState(null);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);

  const analyze = async () => {
    if (!text.trim()) return;
    setLoading(true); setError(""); setJustAnalyzed(null);
    try {
      const analysis = await callClaude(DREAM_SYSTEM, [
        { role: "user", content: `Sogno: ${text}\n\nEmozioni: ${emotions || "non specificate"}\n\nData: ${dreamDate || "non specificata"}` },
      ]);
      const entry = { id: Date.now(), date: dreamDate || new Date().toLocaleDateString("it-IT", { day: "numeric", month: "long", year: "numeric" }), text, emotions, analysis };
      setDreams(p => [entry, ...p]);
      setText(""); setEmotions(""); setDreamDate("");
      setJustAnalyzed(entry);
    } catch (e) { setError(`Impossibile completare l'analisi. ${e.message}`); }
    setLoading(false);
  };

  const deleteDream = (id, e) => {
    e.stopPropagation();
    setConfirmDeleteId(id);
  };
  const confirmDelete = () => {
    setDreams(p => p.filter(d => d.id !== confirmDeleteId));
    if (selectedDream?.id === confirmDeleteId) setSelectedDream(null);
    setConfirmDeleteId(null);
  };

  return (
    <div style={{ padding: "26px 20px" }}>
      <ConfirmModal open={!!confirmDeleteId} message="Eliminare questo sogno dall'archivio?" onConfirm={confirmDelete} onCancel={() => setConfirmDeleteId(null)} />
      <SectionHeader symbol="☽" title="Diario dei Sogni" subtitle="Annota il sogno appena sveglio — entro 10 minuti dal risveglio" />
      <TabBar tabs={[{ id: "add", label: "REGISTRA" }, { id: "list", label: `ARCHIVIO (${dreams.length})` }]} active={tab} onSelect={t => { setTab(t); setJustAnalyzed(null); }} />

      {tab === "add" && (
        <>
          {justAnalyzed ? (
            <div>
              <div style={{ background: "#0a0a1e", border: "1px solid #3a2a5a", borderRadius: 10, padding: 20, marginBottom: 14 }}>
                <p style={{ fontSize: 10, letterSpacing: 2, color: "#8a5090", fontFamily: "'Cinzel', serif", margin: "0 0 10px" }}>ANALISI COMPLETATA</p>
                <p style={{ fontSize: 14, color: "#9090b0", fontStyle: "italic", lineHeight: 1.8, marginBottom: 16, paddingBottom: 16, borderBottom: `1px solid ${border}` }}>{justAnalyzed.text.slice(0, 120)}{justAnalyzed.text.length > 120 ? "…" : ""}</p>
                <p style={{ fontSize: 10, letterSpacing: 2, color: gold, fontFamily: "'Cinzel', serif", margin: "0 0 12px" }}>ANALISI JUNGHIANA</p>
                <div style={{ fontSize: 14, color: textPrimary, lineHeight: 1.95, whiteSpace: "pre-wrap", maxHeight: 280, overflowY: "auto" }}>{justAnalyzed.analysis}</div>
              </div>
              {/* FIX #16: cross-section link */}
              <CrossLink symbol="◑" label="Porta questo tema nel Lavoro sull'Ombra" sub="Esplora cosa il sogno rivela della tua Ombra" onClick={() => setSection("shadow")} />
              <button onClick={() => setJustAnalyzed(null)} style={{ width: "100%", marginTop: 10, padding: "11px", background: "transparent", border: `1px solid ${border}`, borderRadius: 8, color: textSec, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: 1 }}>
                + Registra un altro sogno
              </button>
            </div>
          ) : (
            <>
              <div style={{ marginBottom: 10 }}>
                <label style={labelSt}>DATA DEL SOGNO</label>
                <input value={dreamDate} onChange={e => setDreamDate(e.target.value)} placeholder="es. 18 marzo 2025" style={inpStyle} />
              </div>
              <div style={{ marginBottom: 10 }}>
                <label style={labelSt}>RACCONTO DEL SOGNO</label>
                <textarea value={text} onChange={e => setText(e.target.value)}
                  placeholder="Descrivi il sogno nel maggior dettaglio possibile — luoghi, persone, azioni, colori, atmosfera. Anche i dettagli apparentemente irrilevanti sono spesso i più significativi."
                  style={{ ...taStyle, minHeight: 155 }} />
              </div>
              <div style={{ marginBottom: 4 }}>
                <label style={labelSt}>EMOZIONI (nel sogno e al risveglio)</label>
                <input value={emotions} onChange={e => setEmotions(e.target.value)} placeholder="Paura, meraviglia, tristezza, confusione, euforia…" style={inpStyle} />
              </div>
              {loading && <LoadingPulse message="L'inconscio viene interrogato" />}
              <ErrorBanner message={error} onDismiss={() => setError("")} />
              {!loading && <Btn onClick={analyze} loading={false} disabled={!text.trim()} symbol="☽" label="Analisi Junghiana" fullWidth />}
            </>
          )}
        </>
      )}

      {tab === "list" && (
        <>
          {dreams.length === 0 && !selectedDream && <EmptyState symbol="☽" message="Nessun sogno ancora registrato. I sogni vanno annotati entro pochi minuti dal risveglio, prima che la coscienza li dissolva." />}
          {selectedDream ? (
            <div>
              <button onClick={() => setSelectedDream(null)} style={{ background: "none", border: "none", color: textSec, cursor: "pointer", fontSize: 12, padding: "0 0 16px", fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>← ARCHIVIO</button>
              <div style={{ background: surface, border: "1px solid #3a2a5a", borderRadius: 10, padding: 22 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
                  <p style={{ fontSize: 10, letterSpacing: 2, color: "#8a5090", fontFamily: "'Cinzel', serif", margin: 0 }}>{selectedDream.date}</p>
                  <button onClick={e => deleteDream(selectedDream.id, e)} style={{ background: "none", border: "none", color: "#5a3a3a", cursor: "pointer", fontSize: 12, padding: 0, fontFamily: "'Cinzel', serif" }}>× Elimina</button>
                </div>
                <p style={{ fontSize: 15, color: "#8a8aaa", fontStyle: "italic", lineHeight: 1.9, marginBottom: 16, paddingBottom: 16, borderBottom: `1px solid ${border}` }}>{selectedDream.text}</p>
                {selectedDream.emotions && <p style={{ fontSize: 13, color: textSec, marginBottom: 18, fontStyle: "italic" }}>Emozioni: {selectedDream.emotions}</p>}
                <p style={{ fontSize: 10, letterSpacing: 2, color: gold, fontFamily: "'Cinzel', serif", margin: "0 0 12px" }}>ANALISI JUNGHIANA</p>
                <div style={{ fontSize: 15, color: textPrimary, lineHeight: 1.95, whiteSpace: "pre-wrap" }}>{selectedDream.analysis}</div>
                <CrossLink symbol="◑" label="Porta questo tema nel Lavoro sull'Ombra" sub="Approfondisci cosa il sogno rivela di te" onClick={() => setSection("shadow")} />
              </div>
            </div>
          ) : dreams.map(d => (
            <div key={d.id} onClick={() => setSelectedDream(d)}
              style={{ background: surface, border: `1px solid ${border}`, borderRadius: 10, padding: 14, marginBottom: 8, cursor: "pointer", transition: "border-color 0.2s", position: "relative" }}
              onMouseEnter={e => e.currentTarget.style.borderColor = "#5a3a7a"}
              onMouseLeave={e => e.currentTarget.style.borderColor = border}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                <p style={{ fontSize: 10, letterSpacing: 2, color: "#6a4a7a", fontFamily: "'Cinzel', serif", margin: 0 }}>{d.date}</p>
                <button onClick={e => deleteDream(d.id, e)} style={{ background: "none", border: "none", color: "#3a2a3a", cursor: "pointer", fontSize: 12, padding: 0, fontFamily: "'Cinzel', serif" }}>×</button>
              </div>
              <p style={{ margin: 0, color: "#7a7a9a", fontSize: 14, lineHeight: 1.7, overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>{d.text}</p>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// ================================================================
// SHADOW WORK
// ================================================================
function ShadowSection({ shadowJournal, setShadowJournal, promptIdx, setPromptIdx, tab, setTab, selectedEntry, setSelectedEntry, setSection, psychicContext }) {
  const [response, setResponse] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [justReceived, setJustReceived] = useState(null);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const prompt = SHADOW_PROMPTS[promptIdx];

  const getInsight = async () => {
    if (!response.trim()) return;
    setLoading(true); setError(""); setJustReceived(null);
    try {
      const insight = await callClaude(buildShadowSystem(psychicContext), [
        { role: "user", content: `Livello ${prompt.level} — ${prompt.title}\n\nPrompt: ${prompt.prompt}\n\nMia riflessione: ${response}` },
      ]);
      const entry = { id: Date.now(), date: new Date().toLocaleDateString("it-IT", { day: "numeric", month: "long", year: "numeric" }), prompt, response, insight };
      setShadowJournal(p => [entry, ...p]);
      setJustReceived(entry);
      setResponse("");
    } catch (e) { setError(`Impossibile completare l'elaborazione. ${e.message}`); }
    setLoading(false);
  };

  const deleteEntry = (id, e) => {
    e.stopPropagation();
    setConfirmDeleteId(id);
  };
  const confirmDeleteShadow = () => {
    setShadowJournal(p => p.filter(en => en.id !== confirmDeleteId));
    if (selectedEntry?.id === confirmDeleteId) setSelectedEntry(null);
    setConfirmDeleteId(null);
  };

  return (
    <div style={{ padding: "26px 20px" }}>
      <ConfirmModal open={!!confirmDeleteId} message="Eliminare questa riflessione dall'archivio?" onConfirm={confirmDeleteShadow} onCancel={() => setConfirmDeleteId(null)} />
      <SectionHeader symbol="◑" title="Lavoro sull'Ombra" subtitle="Incontra ciò che hai fuggito — là si nasconde il tuo potere" />
      <TabBar tabs={[{ id: "write", label: "LAVORA OGGI" }, { id: "list", label: `ARCHIVIO (${shadowJournal.length})` }]} active={tab} onSelect={t => { setTab(t); setJustReceived(null); }} />

      {tab === "write" && (
        <>
          <div style={{ display: "flex", gap: 4, marginBottom: 14 }}>
            {SHADOW_PROMPTS.map((p, i) => (
              <div key={i} onClick={() => { setPromptIdx(i); setJustReceived(null); }} title={p.title}
                style={{ flex: 1, height: 4, borderRadius: 2, background: i === promptIdx ? "#9060b0" : i < promptIdx ? "#4a2a6a" : "#1a1a28", cursor: "pointer", transition: "background 0.2s" }} />
            ))}
          </div>

          {justReceived ? (
            <div>
              <div style={{ background: "#0c0818", border: "1px solid #3a1a5a", borderRadius: 10, padding: 20, marginBottom: 14 }}>
                <p style={{ fontSize: 10, letterSpacing: 2, color: "#8a5090", fontFamily: "'Cinzel', serif", margin: "0 0 8px" }}>INSIGHT RICEVUTO — Lv {justReceived.prompt.level} · {justReceived.prompt.title}</p>
                <p style={{ fontSize: 14, color: "#8a7aa0", fontStyle: "italic", lineHeight: 1.85, marginBottom: 16, paddingBottom: 16, borderBottom: `1px solid ${border}` }}>{justReceived.response.slice(0, 150)}{justReceived.response.length > 150 ? "…" : ""}</p>
                <div style={{ fontSize: 14, color: textPrimary, lineHeight: 1.95, whiteSpace: "pre-wrap", maxHeight: 260, overflowY: "auto" }}>{justReceived.insight}</div>
              </div>
              {/* FIX #16 */}
              <CrossLink symbol="◎" label="Porta questa figura nell'Immaginazione Attiva" sub="Dialoga con essa direttamente nell'inconscio" onClick={() => setSection("imagination")} />
              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                <button onClick={() => setJustReceived(null)} style={{ flex: 1, padding: "11px", background: "#0c0818", border: `1px solid #3a2a5a`, borderRadius: 8, color: "#9060b0", cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: 1 }}>
                  ◑ Continua il lavoro
                </button>
                <button onClick={() => { setTab("list"); setJustReceived(null); }} style={{ flex: 1, padding: "11px", background: "transparent", border: `1px solid ${border}`, borderRadius: 8, color: textSec, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: 1 }}>
                  Vai all'archivio
                </button>
              </div>
            </div>
          ) : (
            <>
              <div style={{ background: "#0c0818", border: "1px solid #3a1a5a", borderRadius: 10, padding: 18, marginBottom: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div>
                    <span style={{ fontSize: 10, letterSpacing: 2, color: "#6a3a8a", fontFamily: "'Cinzel', serif" }}>LIVELLO {prompt.level} / {SHADOW_PROMPTS.length}</span>
                    <p style={{ margin: "5px 0 0", fontSize: 15, color: "#c090d8", fontFamily: "'Cinzel', serif", fontWeight: 600 }}>{prompt.title}</p>
                  </div>
                  <div style={{ display: "flex", gap: 5 }}>
                    <button onClick={() => setPromptIdx(Math.max(0, promptIdx - 1))} disabled={promptIdx === 0}
                      style={{ background: "none", border: `1px solid ${border}`, borderRadius: 4, padding: "4px 11px", color: promptIdx > 0 ? textSec : textMuted, cursor: promptIdx > 0 ? "pointer" : "default", fontSize: 13 }}>←</button>
                    <button onClick={() => setPromptIdx(Math.min(SHADOW_PROMPTS.length - 1, promptIdx + 1))} disabled={promptIdx === SHADOW_PROMPTS.length - 1}
                      style={{ background: "none", border: `1px solid ${border}`, borderRadius: 4, padding: "4px 11px", color: promptIdx < SHADOW_PROMPTS.length - 1 ? textSec : textMuted, cursor: promptIdx < SHADOW_PROMPTS.length - 1 ? "pointer" : "default", fontSize: 13 }}>→</button>
                  </div>
                </div>
                <p style={{ margin: "0 0 10px", fontSize: 12, color: "#6a5070", fontStyle: "italic", lineHeight: 1.7, paddingBottom: 10, borderBottom: "1px solid #2a1a3a" }}>{prompt.intro}</p>
                <p style={{ margin: 0, fontSize: 14, color: "#b098b8", lineHeight: 1.95, fontStyle: "italic" }}>{prompt.prompt}</p>
              </div>
              <textarea value={response} onChange={e => setResponse(e.target.value)}
                placeholder="Scrivi liberamente, senza censurare nulla. Questo spazio è sicuro e solo tuo…"
                style={{ ...taStyle, minHeight: 150 }} />
              {loading && <LoadingPulse message="L'Ombra viene interrogata" />}
              <ErrorBanner message={error} onDismiss={() => setError("")} />
              {!loading && <Btn onClick={getInsight} disabled={!response.trim()} symbol="◑" label="Ricevi Insight Junghiano" fullWidth />}
            </>
          )}
        </>
      )}

      {tab === "list" && (
        <>
          {shadowJournal.length === 0 && !selectedEntry && <EmptyState symbol="◑" message="Nessuna riflessione ancora. Il lavoro sull'Ombra inizia con il coraggio del primo sguardo." />}
          {selectedEntry ? (
            <div>
              <button onClick={() => setSelectedEntry(null)} style={{ background: "none", border: "none", color: textSec, cursor: "pointer", fontSize: 12, padding: "0 0 16px", fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>← ARCHIVIO</button>
              <div style={{ background: surface, border: "1px solid #3a1a4a", borderRadius: 10, padding: 22 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4 }}>
                  <p style={{ fontSize: 10, letterSpacing: 2, color: "#8a5090", fontFamily: "'Cinzel', serif", margin: 0 }}>{selectedEntry.date}</p>
                  <button onClick={e => deleteEntry(selectedEntry.id, e)} style={{ background: "none", border: "none", color: "#5a3a3a", cursor: "pointer", fontSize: 12, padding: 0, fontFamily: "'Cinzel', serif" }}>× Elimina</button>
                </div>
                <p style={{ fontSize: 12, color: "#8a6090", fontStyle: "italic", marginBottom: 14, fontFamily: "'Cinzel', serif" }}>Lv {selectedEntry.prompt.level} — {selectedEntry.prompt.title}</p>
                <p style={{ fontSize: 15, color: "#8a7aa0", fontStyle: "italic", lineHeight: 1.9, marginBottom: 18, paddingBottom: 18, borderBottom: `1px solid ${border}` }}>{selectedEntry.response}</p>
                <p style={{ fontSize: 10, letterSpacing: 2, color: "#8a5090", fontFamily: "'Cinzel', serif", margin: "0 0 12px" }}>INSIGHT JUNGHIANO</p>
                <div style={{ fontSize: 15, color: textPrimary, lineHeight: 1.95, whiteSpace: "pre-wrap" }}>{selectedEntry.insight}</div>
                <CrossLink symbol="◎" label="Dialoga con questa figura nell'Immaginazione Attiva" sub="Approfondisci attraverso il dialogo diretto" onClick={() => setSection("imagination")} />
              </div>
            </div>
          ) : shadowJournal.map(e => (
            <div key={e.id} onClick={() => setSelectedEntry(e)}
              style={{ background: surface, border: `1px solid ${border}`, borderRadius: 10, padding: 14, marginBottom: 8, cursor: "pointer", transition: "border-color 0.2s" }}
              onMouseEnter={el => el.currentTarget.style.borderColor = "#5a2a7a"}
              onMouseLeave={el => el.currentTarget.style.borderColor = border}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <p style={{ fontSize: 10, letterSpacing: 2, color: "#7a4080", fontFamily: "'Cinzel', serif", margin: 0 }}>{e.date} · Lv {e.prompt.level} — {e.prompt.title}</p>
                <button onClick={el => deleteEntry(e.id, el)} style={{ background: "none", border: "none", color: "#3a2a3a", cursor: "pointer", fontSize: 12, padding: 0 }}>×</button>
              </div>
              <p style={{ margin: 0, color: "#8a7a9a", fontSize: 14, lineHeight: 1.7, overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>{e.response}</p>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// ================================================================
function ArchetypesSection({ myArchetypes, setMyArchetypes, archView, setArchView, detailId, setDetailId, guidance, setGuidance, archLoading, setArchLoading, psychicContext }) {
  const loading = archLoading;
  const setLoading = setArchLoading;
  const [error, setError] = useState("");

  const toggle = id => setMyArchetypes(p => p.includes(id) ? p.filter(a => a !== id) : [...p, id]);

  const getGuidance = async () => {
    if (!myArchetypes.length) return;
    setLoading(true); setArchView("guidance"); setError("");
    const sel = ARCHETYPES_DATA.filter(a => myArchetypes.includes(a.id));
    try {
      const g = await callClaude(buildArchSystem(psychicContext), [{ role: "user", content: `Archetipi dominanti/risonanti: ${sel.map(a => a.name).join(", ")}` }]);
      setGuidance(g);
    } catch (e) {
      setError(`Analisi non disponibile. ${e.message}`);
      // FIX #5: errore resta nella guidance view, non torna a grid silenziosamente
    }
    setLoading(false);
  };

  if (archView === "detail") {
    const arch = ARCHETYPES_DATA.find(a => a.id === detailId);
    if (!arch) return null;
    const isActive = myArchetypes.includes(detailId);
    const h = arch.colorHue;
    return (
      <div style={{ padding: "26px 20px" }}>
        <button onClick={() => setArchView("grid")} style={{ background: "none", border: "none", color: textSec, cursor: "pointer", fontSize: 12, padding: "0 0 18px", fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>← ARCHETIPI</button>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 40, marginBottom: 10, color: `hsl(${h},55%,62%)` }}>{arch.symbol}</div>
          <h2 style={{ fontFamily: "'Cinzel', serif", color: gold, margin: "0 0 5px", fontSize: 19 }}>{arch.name}</h2>
          <p style={{ color: textSec, fontSize: 12, margin: "0 0 3px", letterSpacing: 1 }}>{arch.tagline}</p>
          <p style={{ color: textMuted, fontSize: 10, margin: 0, fontFamily: "'Cinzel', serif" }}>ARCHETIPO #{arch.order}</p>
        </div>
        {[
          { label: "ESSENZA", border: "#2a2a4a", textColor: textPrimary, bg: surface, lc: gold, content: arch.desc },
          { label: "OMBRA", border: "#3a1a5a", textColor: "#c0a0d8", bg: "#0c0816", lc: "#9060b0", content: arch.shadow },
          { label: "INTEGRAZIONE", border: "#1a3a2a", textColor: "#90c0a0", bg: "#090f0c", lc: "#50a060", content: arch.integration },
        ].map(b => (
          <div key={b.label} style={{ background: b.bg, border: `1px solid ${b.border}`, borderRadius: 10, padding: 16, marginBottom: 10 }}>
            <p style={{ fontSize: 10, letterSpacing: 2, color: b.lc, fontFamily: "'Cinzel', serif", margin: "0 0 9px" }}>{b.label}</p>
            <p style={{ fontSize: 14, color: b.textColor, lineHeight: 1.95, margin: 0 }}>{b.content}</p>
          </div>
        ))}
        <div style={{ background: "#0a0a1e", border: `1px solid ${border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
          <p style={{ fontSize: 10, letterSpacing: 2, color: "#5060a0", fontFamily: "'Cinzel', serif", margin: "0 0 12px" }}>DOMANDE DI LAVORO</p>
          {arch.questions.map((q, i) => (
            <p key={i} style={{ fontSize: 14, color: "#8090c0", lineHeight: 1.85, margin: "0 0 10px", paddingLeft: 12, borderLeft: "2px solid #2a2a5a", fontStyle: "italic" }}>{q}</p>
          ))}
        </div>
        <button onClick={() => toggle(arch.id)}
          style={{ width: "100%", padding: 13, background: isActive ? "#150808" : "#08150c", border: `1px solid ${isActive ? "#6a2a2a" : "#2a5a3a"}`, borderRadius: 8, color: isActive ? "#c08080" : "#80c0a0", cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 11, letterSpacing: 1 }}>
          {isActive ? "✓ Rimuovi dagli archetipi attivi" : "+ Aggiungi agli archetipi attivi"}
        </button>
      </div>
    );
  }

  if (archView === "guidance") {
    return (
      <div style={{ padding: "26px 20px" }}>
        <button onClick={() => setArchView("grid")} style={{ background: "none", border: "none", color: textSec, cursor: "pointer", fontSize: 12, padding: "0 0 18px", fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>← ARCHETIPI</button>
        <SectionHeader symbol="✦" title="La Tua Costellazione" subtitle="Analisi della configurazione archetipica personale" />
        <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 18 }}>
          {ARCHETYPES_DATA.filter(a => myArchetypes.includes(a.id)).map(a => (
            <span key={a.id} style={{ background: "#12123a", border: "1px solid #3a3a7a", borderRadius: 20, padding: "4px 13px", fontSize: 12, color: gold, fontFamily: "'Cinzel', serif" }}>{a.symbol} {a.name}</span>
          ))}
        </div>
        <ErrorBanner message={error} onDismiss={() => setError("")} />
        {loading ? <LoadingPulse message="Analisi della costellazione in corso" /> : guidance ? (
          <div style={{ background: surface, border: `1px solid ${border}`, borderRadius: 10, padding: 20 }}>
            <div style={{ fontSize: 15, color: textPrimary, lineHeight: 1.95, whiteSpace: "pre-wrap" }}>{guidance}</div>
          </div>
        ) : !error && (
          <LoadingPulse message="Analisi della costellazione in corso" />
        )}
      </div>
    );
  }

  return (
    <div style={{ padding: "26px 20px" }}>
      <SectionHeader symbol="✦" title="Archetipi" subtitle="Le figure universali dell'inconscio collettivo" />
      <div style={{ background: "#08081a", border: `1px solid ${border}`, borderRadius: 10, padding: 14, marginBottom: 14 }}>
        <p style={{ margin: "0 0 9px", fontSize: 13, color: textSec, lineHeight: 1.75 }}>Esplora gli archetipi e seleziona quelli con cui senti una risonanza profonda — non quelli "ideali", ma quelli che riconosci in te.</p>
        {myArchetypes.length > 0 ? (
          <button onClick={getGuidance}
            style={{ padding: "9px 16px", background: "#0c0c28", border: "1px solid #4a4a9a", borderRadius: 7, color: "#9090e0", cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: 1 }}>
            ✦ Analizza la mia costellazione ({myArchetypes.length} selezionati)
          </button>
        ) : (
          <p style={{ margin: 0, fontSize: 12, color: textMuted, fontStyle: "italic" }}>Seleziona almeno un archetipo per ricevere l'analisi.</p>
        )}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9 }}>
        {ARCHETYPES_DATA.map(arch => {
          const isActive = myArchetypes.includes(arch.id);
          const h = arch.colorHue;
          return (
            <div key={arch.id} style={{ background: isActive ? `hsl(${h},16%,8%)` : surface, border: `1px solid ${isActive ? `hsl(${h},36%,20%)` : border}`, borderRadius: 10, padding: "14px 12px", position: "relative", transition: "border-color 0.2s" }}>
              {isActive && <div style={{ position: "absolute", top: 7, right: 9, fontSize: 10, color: `hsl(${h},65%,60%)`, fontWeight: 700 }}>✓</div>}
              <div onClick={() => { setDetailId(arch.id); setArchView("detail"); }} style={{ cursor: "pointer", marginBottom: 9 }}>
                <div style={{ fontSize: 20, color: `hsl(${h},50%,56%)`, marginBottom: 6 }}>{arch.symbol}</div>
                <p style={{ margin: "0 0 3px", fontSize: 11, fontFamily: "'Cinzel', serif", color: textPrimary, fontWeight: 600 }}>{arch.name}</p>
                <p style={{ margin: "0 0 9px", fontSize: 11, color: "#4a4a60", lineHeight: 1.5 }}>{arch.tagline}</p>
              </div>
              <button onClick={() => toggle(arch.id)}
                style={{ fontSize: 10, color: isActive ? `hsl(${h},60%,60%)` : "#3a3a55", background: "transparent", border: `1px solid ${isActive ? `hsl(${h},33%,18%)` : "#181825"}`, borderRadius: 4, padding: "4px 9px", cursor: "pointer", fontFamily: "'Cinzel', serif", width: "100%" }}>
                {isActive ? "✓ Selezionato" : "+ Seleziona"}
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ================================================================
// IMAGINATION ACTIVE
// ================================================================
function ImaginationSection({ figure, setFigure, messages, setMessages, phase, setPhase, psychicContext }) {
  // FIX #3: phase è nel root, non locale
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const send = async () => {
    if (!input.trim() || !figure || loading) return;
    const userMsg = { role: "user", content: input };
    const updated = [...messages, userMsg];
    setMessages(updated); setInput(""); setLoading(true); setError("");
    try {
      const sys = buildImagBase(figure.suffix, psychicContext);
      const reply = await callClaude(sys, updated);
      setMessages([...updated, { role: "assistant", content: reply }]);
    } catch (e) { setError(`Errore nel dialogo. ${e.message}`); }
    setLoading(false);
  };

  if (phase === "select") {
    return (
      <div style={{ padding: "26px 20px" }}>
        <SectionHeader symbol="◎" title="Immaginazione Attiva" subtitle="Un incontro consapevole con il tuo inconscio" />
        <div style={{ background: surface, border: `1px solid ${border}`, borderRadius: 10, padding: 18, marginBottom: 20 }}>
          <p style={{ fontSize: 14, color: textSec, lineHeight: 1.95, margin: 0 }}>
            L'immaginazione attiva è una tecnica di Jung per entrare in <span style={{ color: gold }}>dialogo cosciente</span> con le figure dell'inconscio. Non è fantasia passiva — è un incontro reale condotto con presenza e intenzione.<br /><br />
            Scegli la figura con cui vuoi lavorare oggi.
          </p>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {IMAGINATION_FIGURES.map(f => (
            <div key={f.id} onClick={() => { setFigure(f); setPhase("prepare"); }}
              style={{ background: `hsl(${f.hue},14%,7%)`, border: `1px solid hsl(${f.hue},22%,14%)`, borderRadius: 10, padding: 20, cursor: "pointer", textAlign: "center", transition: "border-color 0.2s" }}
              onMouseEnter={e => e.currentTarget.style.borderColor = `hsl(${f.hue},38%,28%)`}
              onMouseLeave={e => e.currentTarget.style.borderColor = `hsl(${f.hue},22%,14%)`}>
              <div style={{ fontSize: 28, color: `hsl(${f.hue},52%,58%)`, marginBottom: 10 }}>{f.symbol}</div>
              <p style={{ margin: "0 0 6px", fontSize: 12, fontFamily: "'Cinzel', serif", color: textPrimary, fontWeight: 600 }}>{f.name}</p>
              <p style={{ margin: 0, fontSize: 12, color: "#4a4a60", lineHeight: 1.6 }}>{f.desc}</p>
            </div>
          ))}
        </div>
      </div>
    );
  }

  if (phase === "prepare") {
    return (
      <div style={{ padding: "26px 20px" }}>
        <button onClick={() => setPhase("select")} style={{ background: "none", border: "none", color: textSec, cursor: "pointer", fontSize: 12, padding: "0 0 18px", fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>← SCEGLI FIGURA</button>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 38, color: `hsl(${figure.hue},52%,58%)`, marginBottom: 10 }}>{figure.symbol}</div>
          <h2 style={{ fontFamily: "'Cinzel', serif", color: gold, margin: "0 0 5px", fontSize: 17 }}>{figure.name}</h2>
        </div>
        <div style={{ background: surface, border: `1px solid hsl(${figure.hue},22%,14%)`, borderRadius: 10, padding: 20, marginBottom: 18 }}>
          <p style={{ fontSize: 10, letterSpacing: 2, color: goldDim, fontFamily: "'Cinzel', serif", margin: "0 0 14px" }}>PREPARAZIONE</p>
          <p style={{ fontSize: 14, color: textSec, lineHeight: 2, margin: 0 }}>
            Prima di iniziare, prenditi un momento.<br /><br />
            <span style={{ color: textPrimary }}>Siediti in silenzio. Chiudi gli occhi.</span> Fai tre respiri profondi — inspirando lentamente, espirando completamente.<br /><br />
            Nota la sensazione del corpo. <span style={{ color: textPrimary }}>Sii presente.</span> L'immaginazione attiva richiede che tu rimanga <span style={{ color: textPrimary }}>consapevole e vigile</span> — non ti addormenti nel sogno, ma lo incontri da sveglio.<br /><br />
            Quando sei pronto, scrivi la tua prima parola a <em style={{ color: gold }}>{figure.name}</em>.
          </p>
        </div>
        <button onClick={() => { setPhase("dialogue"); }}
          style={{ width: "100%", padding: 13, background: `hsl(${figure.hue},18%,8%)`, border: `1px solid hsl(${figure.hue},38%,20%)`, borderRadius: 8, color: `hsl(${figure.hue},58%,62%)`, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 11, letterSpacing: 1.5 }}>
          {figure.symbol}  Sono pronto — Inizia il dialogo
        </button>
      </div>
    );
  }

  if (phase === "close") {
    return (
      <div style={{ padding: "26px 20px" }}>
        <div style={{ textAlign: "center", padding: "18px 0 26px" }}>
          <div style={{ fontSize: 38, color: gold, marginBottom: 10, opacity: 0.5 }}>⊕</div>
          <h2 style={{ fontFamily: "'Cinzel', serif", color: gold, margin: "0 0 6px", fontSize: 17 }}>Chiusura del Dialogo</h2>
        </div>
        <div style={{ background: surface, border: `1px solid ${border}`, borderRadius: 10, padding: 20, marginBottom: 18 }}>
          <p style={{ fontSize: 14, color: textSec, lineHeight: 2, margin: 0 }}>
            Il dialogo si è concluso.<br /><br />
            <span style={{ color: textPrimary }}>Sentiti di nuovo nel corpo.</span> Muovi le mani, i piedi. Senti il peso del sedile sotto di te.<br /><br />
            Questo è il <span style={{ color: gold }}>rituale di chiusura</span> — essenziale per non rimanere "dentro". L'inconscio è stato visitato. Ora torna nell'ego con quello che hai ricevuto.<br /><br />
            Se hai ricevuto un'immagine o un'intuizione — <span style={{ color: textPrimary }}>annotala subito nel diario dei sogni</span> prima che svanisca.
          </p>
        </div>
        <div style={{ display: "flex", gap: 9 }}>
          <button onClick={() => setPhase("dialogue")}
            style={{ flex: 1, padding: 12, background: "transparent", border: `1px solid ${border}`, borderRadius: 8, color: textSec, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: 1 }}>
            ← Riprendi
          </button>
          <button onClick={() => { setFigure(null); setMessages([]); setPhase("select"); }}
            style={{ flex: 1, padding: 12, background: "#141008", border: `1px solid ${gold}`, borderRadius: 8, color: gold, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: 1 }}>
            ⊕ Concludi
          </button>
        </div>
      </div>
    );
  }

  // dialogue
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 118px)" }}>
      <div style={{ padding: "13px 20px", borderBottom: `1px solid ${border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
          <span style={{ fontSize: 17, color: `hsl(${figure.hue},52%,58%)` }}>{figure.symbol}</span>
          <p style={{ margin: 0, fontSize: 12, fontFamily: "'Cinzel', serif", color: gold }}>{figure.name}</p>
        </div>
        <button onClick={() => setPhase("close")} style={{ padding: "5px 12px", background: "none", border: `1px solid ${border}`, borderRadius: 5, color: textSec, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 9, letterSpacing: 1 }}>CONCLUDI ↗</button>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "18px 20px 10px" }}>
        {messages.length === 0 && (
          <div style={{ textAlign: "center", padding: "36px 20px" }}>
            <p style={{ fontSize: 15, lineHeight: 2, fontStyle: "italic", color: "#3a3a55", fontFamily: "'Cormorant Garamond', serif" }}>Il silenzio è pronto.<br />Scrivi la tua prima parola a {figure.name}.</p>
          </div>
        )}
        {messages.map((m, i) => (
          <div key={i} style={{ marginBottom: 16, textAlign: m.role === "user" ? "right" : "left" }}>
            <div style={{ display: "inline-block", maxWidth: "82%", padding: "13px 17px", borderRadius: m.role === "user" ? "12px 12px 3px 12px" : "12px 12px 12px 3px", background: m.role === "user" ? "#0c1628" : "#0e0e24", border: `1px solid ${m.role === "user" ? "#263468" : `hsl(${figure.hue},22%,14%)`}`, textAlign: "left" }}>
              {m.role === "assistant" && <p style={{ fontSize: 9, letterSpacing: 2, color: `hsl(${figure.hue},48%,52%)`, fontFamily: "'Cinzel', serif", margin: "0 0 8px" }}>{figure.name.toUpperCase()}</p>}
              <p style={{ margin: 0, fontSize: 15, color: textPrimary, lineHeight: 1.95, fontStyle: m.role === "assistant" ? "italic" : "normal", whiteSpace: "pre-wrap", fontFamily: "'Cormorant Garamond', serif" }}>{m.content}</p>
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: "inline-block", padding: "12px 16px", borderRadius: "12px 12px 12px 3px", background: "#0e0e24", border: `1px solid hsl(${figure.hue},18%,11%)` }}>
              <p style={{ margin: 0, fontSize: 13, color: "#2a2a50", fontStyle: "italic" }}>⋯</p>
            </div>
          </div>
        )}
        <div ref={endRef} />
      </div>

      <div style={{ padding: "11px 20px 15px", borderTop: `1px solid ${border}`, flexShrink: 0 }}>
        <ErrorBanner message={error} onDismiss={() => setError("")} />
        <div style={{ display: "flex", gap: 9, marginTop: error ? 8 : 0 }}>
          <textarea value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === "Enter" && !e.shiftKey && (e.preventDefault(), send())}
            placeholder="Scrivi…" rows={2}
            style={{ flex: 1, background: surface, border: `1px solid ${border}`, borderRadius: 7, padding: "10px 13px", color: textPrimary, fontFamily: "'Cormorant Garamond', serif", fontSize: 15, resize: "none", outline: "none" }} />
          <button onClick={send} disabled={loading || !input.trim()}
            style={{ padding: "0 20px", background: !loading && input.trim() ? gold : "#121220", border: "none", borderRadius: 7, color: !loading && input.trim() ? bg : "#2a2a4a", cursor: !loading && input.trim() ? "pointer" : "default", fontSize: 19, transition: "all 0.2s" }}>→</button>
        </div>
      </div>
    </div>
  );
}

// INDIVIDUATION
// ================================================================
function IndividuationSection({ individuationStage, setIndividuationStage, indView, setIndView, quizStep, setQuizStep, quizAnswers, setQuizAnswers, psychicContext }) {
  const [expanded, setExpanded] = useState(individuationStage);
  const [openAnswers, setOpenAnswers] = useState({});
  const [quizLoading, setQuizLoading] = useState(false);
  const [quizResult, setQuizResult] = useState(lsGet("ind_quiz_result", null));
  const [quizError, setQuizError] = useState("");

  const setOpen = (i, v) => setOpenAnswers(prev => ({ ...prev, [i]: v }));

  // Check if all questions answered
  const allAnswered = QUIZ_QUESTIONS.every((q, i) => {
    if (q.type === "scale") return quizAnswers[i] !== undefined;
    return (openAnswers[i] || "").trim().length > 2;
  });

  const submitQuiz = async () => {
    setQuizLoading(true); setQuizError("");
    const summary = QUIZ_QUESTIONS.map((q, i) => {
      if (q.type === "scale") {
        const chosen = q.opts[quizAnswers[i]] || "non risposto";
        return `${i+1}. [${q.q}] → "${chosen}"`;
      } else {
        return `${i+1}. [${q.q}] → "${(openAnswers[i] || "").trim()}"`;
      }
    }).join("\n");

    const QUIZ_SYSTEM = `Sei un analista junghiano esperto. Stai valutando il punto del cammino di individuazione di una persona basandoti sulle sue risposte a 10 domande.

Le 6 fasi di individuazione secondo Jung (in ordine crescente):
0. Sonno dell'Ego (inconsapevolezza totale, guidato dalla Persona)
1. Il Primo Risveglio (qualcosa si incrina, prime domande sul sé)
2. La Discesa nell'Ombra (confronto con il rimosso, lavoro attivo)
3. L'Incontro con l'Anima/Animus (profondità emotiva e creativa)
4. L'Incontro con il Sé (integrazione degli archetipi, senso profondo)
5. La Realizzazione del Sé (totalità, ego al servizio del Sé)

Basandoti sulle risposte, fornisci:
1. Una valutazione della fase attuale (0-5) con spiegazione dettagliata di PERCHÉ, citando risposte specifiche
2. Un'analisi dei pattern psichici emergenti — cosa rivela questo profilo?
3. La tensione principale che questa persona porta in questo momento
4. 2-3 indicazioni di lavoro specifiche e personalizzate per il prossimo periodo
5. Un invito finale — una frase evocativa che parli direttamente a questa persona

Importante: il percorso non è lineare. Indica la fase prevalente ma riconosci la complessità. Italiano. 450-600 parole.${psychicContext}`;

    try {
      const result = await callClaude(QUIZ_SYSTEM, [{ role: "user", content: `Risposte al questionario di individuazione:\n\n${summary}` }]);
      // Extract stage number from result text
      let stage = individuationStage;
      for (let i = 5; i >= 0; i--) {
        if (result.includes(`fase ${i}`) || result.includes(`Fase ${i}`) || result.includes(`fase: ${i}`) || result.includes(INDIVIDUATION_STAGES[i].name)) {
          stage = i; break;
        }
      }
      const res = { text: result, stage, date: new Date().toLocaleDateString("it-IT", { day: "numeric", month: "long", year: "numeric" }) };
      setQuizResult(res);
      lsSet("ind_quiz_result", res);
      setIndividuationStage(stage);
    } catch (e) { setQuizError(`Impossibile completare la valutazione. ${e.message}`); }
    setQuizLoading(false);
  };

  if (indView === "quiz") {
    if (quizResult && quizStep >= QUIZ_QUESTIONS.length) {
      return (
        <div style={{ padding: "26px 20px" }}>
          <button onClick={() => setIndView("map")} style={{ background: "none", border: "none", color: textSec, cursor: "pointer", fontSize: 12, padding: "0 0 16px", fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>← CAMMINO</button>
          <SectionHeader symbol="◎" title="La Tua Valutazione" subtitle={`Analisi del ${quizResult.date}`} />
          <div style={{ background: "#14110a", border: `1px solid ${gold}`, borderRadius: 10, padding: 20, marginBottom: 14, textAlign: "center" }}>
            <div style={{ fontSize: 36, color: gold, marginBottom: 8 }}>{INDIVIDUATION_STAGES[quizResult.stage]?.symbol}</div>
            <p style={{ fontFamily: "'Cinzel', serif", color: gold, fontSize: 16, margin: "0 0 4px" }}>{INDIVIDUATION_STAGES[quizResult.stage]?.name}</p>
            <p style={{ color: textSec, fontSize: 12, margin: 0 }}>Fase prevalente identificata</p>
          </div>
          <div style={{ background: surface, border: `1px solid ${border}`, borderRadius: 10, padding: 20, marginBottom: 14 }}>
            <div style={{ fontSize: 14, color: textPrimary, lineHeight: 1.95, whiteSpace: "pre-wrap" }}>{quizResult.text}</div>
          </div>
          <div style={{ display: "flex", gap: 9 }}>
            <button onClick={() => { setQuizResult(null); lsSet("ind_quiz_result", null); setQuizAnswers([]); setOpenAnswers({}); setQuizStep(0); }}
              style={{ flex: 1, padding: 12, background: "transparent", border: `1px solid ${border}`, borderRadius: 8, color: textSec, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10 }}>
              Rifai il questionario
            </button>
            <button onClick={() => { setExpanded(quizResult.stage); setIndView("map"); }}
              style={{ flex: 1, padding: 12, background: "#141008", border: `1px solid ${gold}`, borderRadius: 8, color: gold, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10 }}>
              ⊕ Vai alla mappa
            </button>
          </div>
        </div>
      );
    }

    const currentQ = QUIZ_QUESTIONS[quizStep] || null;
    const isLastStep = quizStep === QUIZ_QUESTIONS.length;

    return (
      <div style={{ padding: "26px 20px" }}>
        <button onClick={() => { setIndView("map"); }} style={{ background: "none", border: "none", color: textSec, cursor: "pointer", fontSize: 12, padding: "0 0 16px", fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>← CAMMINO</button>
        <div style={{ display: "flex", gap: 3, marginBottom: 20 }}>
          {QUIZ_QUESTIONS.map((q, i) => {
            const done = q.type === "scale" ? quizAnswers[i] !== undefined : (openAnswers[i] || "").trim().length > 2;
            return <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: done ? gold : i === quizStep ? "#8a6030" : "#1a1a28", transition: "background 0.3s" }} />;
          })}
        </div>

        {!isLastStep && currentQ && (
          <>
            <p style={{ fontSize: 10, color: goldDim, letterSpacing: 2, fontFamily: "'Cinzel', serif", margin: "0 0 12px" }}>
              DOMANDA {quizStep + 1} / {QUIZ_QUESTIONS.length} {currentQ.type === "open" ? "— RIFLESSIONE APERTA" : "— SCALA"}
            </p>
            <p style={{ fontSize: 17, color: textPrimary, lineHeight: 1.8, margin: "0 0 22px", fontFamily: "'Cormorant Garamond', serif" }}>{currentQ.q}</p>

            {currentQ.type === "scale" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {currentQ.opts.map((opt, i) => {
                  const selected = quizAnswers[quizStep] === i;
                  return (
                    <button key={i} onClick={() => {
                        const a = [...quizAnswers]; a[quizStep] = i; setQuizAnswers(a);
                        if (quizStep < QUIZ_QUESTIONS.length - 1) setTimeout(() => setQuizStep(s => s + 1), 200);
                      }}
                      style={{ padding: "13px 16px", background: selected ? "#1a1507" : surface, border: `1px solid ${selected ? gold : border}`, borderRadius: 8, color: selected ? gold : textPrimary, cursor: "pointer", textAlign: "left", fontSize: 14, fontFamily: "'Cormorant Garamond', serif", lineHeight: 1.65, transition: "all 0.15s" }}>
                      {opt}
                    </button>
                  );
                })}
              </div>
            )}

            {currentQ.type === "open" && (
              <>
                <textarea value={openAnswers[quizStep] || ""} onChange={e => setOpen(quizStep, e.target.value)}
                  placeholder={currentQ.placeholder}
                  style={{ ...taStyle, minHeight: 120, marginBottom: 10 }} />
                <button onClick={() => setQuizStep(s => s + 1)} disabled={!(openAnswers[quizStep] || "").trim()}
                  style={{ padding: "11px 24px", background: (openAnswers[quizStep] || "").trim() ? "#1a1507" : "transparent", border: `1px solid ${(openAnswers[quizStep] || "").trim() ? gold : border}`, borderRadius: 8, color: (openAnswers[quizStep] || "").trim() ? gold : textMuted, cursor: (openAnswers[quizStep] || "").trim() ? "pointer" : "default", fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: 1 }}>
                  Continua →
                </button>
              </>
            )}

            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20 }}>
              <button onClick={() => setQuizStep(s => Math.max(0, s - 1))} disabled={quizStep === 0}
                style={{ background: "none", border: `1px solid ${border}`, borderRadius: 6, padding: "7px 16px", color: quizStep > 0 ? textSec : textMuted, cursor: quizStep > 0 ? "pointer" : "default", fontFamily: "'Cinzel', serif", fontSize: 10 }}>← Indietro</button>
              {quizStep < QUIZ_QUESTIONS.length - 1 && currentQ.type === "scale" && quizAnswers[quizStep] !== undefined && (
                <button onClick={() => setQuizStep(s => s + 1)}
                  style={{ background: "none", border: `1px solid ${border}`, borderRadius: 6, padding: "7px 16px", color: textSec, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10 }}>Avanti →</button>
              )}
            </div>
          </>
        )}

        {isLastStep && (
          <div style={{ textAlign: "center", padding: "20px 0" }}>
            <div style={{ background: surface, border: `1px solid ${border}`, borderRadius: 10, padding: 20, marginBottom: 20 }}>
              <p style={{ fontSize: 14, color: textSec, lineHeight: 1.9, margin: 0, fontStyle: "italic" }}>
                Hai completato tutte le {QUIZ_QUESTIONS.length} domande.<br /><br />
                Claude analizzerà le tue risposte e ti fornirà una valutazione approfondita e personalizzata del tuo punto del cammino junghiano.
              </p>
            </div>
            <ErrorBanner message={quizError} onDismiss={() => setQuizError("")} />
            {quizLoading ? <LoadingPulse message="Il percorso viene analizzato in profondità" /> : (
              <Btn onClick={submitQuiz} disabled={!allAnswered} symbol="⊕" label="Ricevi la valutazione" fullWidth />
            )}
          </div>
        )}
      </div>
    );
  }

  // map view
  return (
    <div style={{ padding: "26px 20px" }}>
      <SectionHeader symbol="⊕" title="Il Cammino" subtitle="Il processo di individuazione secondo Jung" />
      <button onClick={() => { setIndView("quiz"); setQuizStep(0); setQuizAnswers([]); }}
        style={{ width: "100%", padding: "10px", background: "#0a0a1c", border: "1px solid #3a3a7a", borderRadius: 8, color: "#8080c0", cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: 1, marginBottom: 18 }}>
        ◎ SCOPRI LA TUA FASE — Questionario orientativo
      </button>
      {INDIVIDUATION_STAGES.map((stage, i) => {
        const isActive = i === individuationStage;
        const isPast = i < individuationStage;
        const isExpanded = expanded === i;
        return (
          <div key={stage.id} style={{ marginBottom: 7 }}>
            <div onClick={() => setExpanded(isExpanded ? null : i)}
              style={{ background: isActive ? "#16120a" : surface, border: `1px solid ${isActive ? gold : isPast ? "#252540" : border}`, borderRadius: 10, padding: "14px 16px", cursor: "pointer", position: "relative" }}>
              {isActive && <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: gold, borderRadius: "10px 0 0 10px" }} />}
              <div style={{ display: "flex", alignItems: "center", gap: 13 }}>
                <span style={{ fontSize: 20, color: isActive ? gold : isPast ? "#353550" : "#1e1e38", minWidth: 26, textAlign: "center" }}>{stage.symbol}</span>
                <div style={{ flex: 1 }}>
                  <p style={{ margin: 0, fontSize: 12, fontFamily: "'Cinzel', serif", color: isActive ? gold : isPast ? "#505070" : "#242438", fontWeight: 600 }}>{stage.name}</p>
                  <p style={{ margin: "3px 0 0", fontSize: 12, color: isActive ? goldDim : "#222235" }}>{stage.short}</p>
                </div>
                {isActive && <span style={{ fontSize: 9, color: goldDim, fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>ATTUALE</span>}
                <span style={{ fontSize: 10, color: "#1e1e35" }}>{isExpanded ? "▲" : "▼"}</span>
              </div>
              {isExpanded && (
                <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${border}` }}>
                  <p style={{ margin: "0 0 14px", fontSize: 14, color: "#a09060", lineHeight: 1.9 }}>{stage.desc}</p>
                  <div style={{ background: "#090d09", border: "1px solid #182818", borderRadius: 8, padding: 13, marginBottom: 12 }}>
                    <p style={{ fontSize: 10, letterSpacing: 2, color: "#3a5a3a", fontFamily: "'Cinzel', serif", margin: "0 0 8px" }}>SEGNALI DI QUESTA FASE</p>
                    {stage.signs.map((s, si) => <p key={si} style={{ margin: "0 0 6px", fontSize: 13, color: "#5a7050", lineHeight: 1.7, fontStyle: "italic", paddingLeft: 11, borderLeft: "2px solid #1a3018" }}>{s}</p>)}
                  </div>
                  <div style={{ background: "#07100a", border: "1px solid #142014", borderRadius: 8, padding: 13, marginBottom: 12 }}>
                    <p style={{ fontSize: 10, letterSpacing: 2, color: "#3a6040", fontFamily: "'Cinzel', serif", margin: "0 0 8px" }}>PRATICA CONSIGLIATA</p>
                    <p style={{ margin: 0, fontSize: 13, color: "#608060", lineHeight: 1.85, fontStyle: "italic" }}>{stage.practice}</p>
                  </div>
                  {!isActive && (
                    <button onClick={e => { e.stopPropagation(); setIndividuationStage(i); setExpanded(i); }}
                      style={{ padding: "8px 18px", background: "transparent", border: `1px solid ${gold}`, borderRadius: 6, color: gold, cursor: "pointer", fontFamily: "'Cinzel', serif", fontSize: 10, letterSpacing: 1 }}>
                      Sono in questa fase
                    </button>
                  )}
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// API KEY GATE
// ================================================================
function ApiKeyGate({ onSave }) {
  const [val, setVal] = useState("");
  const [err, setErr] = useState("");
  const [testing, setTesting] = useState(false);

  const test = async () => {
    const trimmed = val.trim();
    if (!trimmed.startsWith("sk-ant-")) { setErr("La chiave deve iniziare con 'sk-ant-'"); return; }
    setTesting(true); setErr("");
    try {
      saveApiKey(trimmed);
      await callClaude("Rispondi solo con la parola: ok", [{ role: "user", content: "test connessione" }]);
      onSave();
    } catch(e) {
      saveApiKey("");
      setErr("Errore: " + e.message);
    }
    setTesting(false);
  };

  return (
    <div style={{ minHeight: "100dvh", background: bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 24px" }}>
      <div style={{ fontSize: 34, color: gold, marginBottom: 18 }}>⊕</div>
      <h1 style={{ fontFamily: "'Cinzel', serif", color: gold, fontSize: 18, letterSpacing: 3, marginBottom: 6, textAlign: "center" }}>INDIVIDUATIO</h1>
      <p style={{ fontSize: 11, color: goldDim, letterSpacing: 2, fontFamily: "'Cinzel', serif", marginBottom: 32 }}>PERCORSO JUNGHIANO</p>
      <div style={{ width: "100%", maxWidth: 400, background: surface, border: "1px solid #2a2a4a", borderRadius: 12, padding: 22 }}>
        <p style={{ fontSize: 10, letterSpacing: 2, color: goldDim, fontFamily: "'Cinzel', serif", margin: "0 0 10px" }}>CONFIGURAZIONE INIZIALE</p>
        <p style={{ fontSize: 14, color: textSec, lineHeight: 1.85, margin: "0 0 18px" }}>
          Per funzionare, l'app usa la tua <span style={{ color: textPrimary }}>API key personale di Anthropic</span>. Viene salvata solo sul tuo dispositivo.
        </p>
        <div style={{ background: "#0a0a18", border: "1px solid #1e1e3a", borderRadius: 8, padding: 14, marginBottom: 18 }}>
          <p style={{ fontSize: 11, color: "#5060a0", margin: "0 0 8px", fontFamily: "'Cinzel', serif", letterSpacing: 1 }}>COME OTTENERLA</p>
          <p style={{ fontSize: 13, color: "#6070a0", lineHeight: 1.85, margin: 0 }}>
            1. Vai su <span style={{ color: gold }}>console.anthropic.com</span><br />
            2. Crea un account (gratuito)<br />
            3. Sezione <span style={{ color: gold }}>API Keys → Create Key</span><br />
            4. Copia e incolla la chiave qui sotto<br />
            <span style={{ fontSize: 11, color: textMuted, display: "block", marginTop: 6 }}>Costo indicativo: ~0.01€ per analisi</span>
          </p>
        </div>
        <label style={{ fontSize: 10, color: textSec, fontFamily: "'Cinzel', serif", letterSpacing: 1, display: "block", marginBottom: 6 }}>LA TUA API KEY</label>
        <input value={val} onChange={e => { setVal(e.target.value); setErr(""); }} placeholder="sk-ant-api03-..." type="password"
          style={{ width: "100%", background: "#06060c", border: "1px solid #2a2a4a", borderRadius: 8, padding: "12px 14px", color: textPrimary, fontFamily: "monospace", fontSize: 13, outline: "none", boxSizing: "border-box", marginBottom: 10 }} />
        {err && <p style={{ fontSize: 13, color: "#c08080", margin: "0 0 10px", lineHeight: 1.6 }}>{err}</p>}
        <button onClick={test} disabled={testing || !val.trim()}
          style={{ width: "100%", padding: "13px", background: val.trim() ? "#1a1507" : "#0c0c18", border: "1px solid " + (val.trim() ? gold : "#1a1a2a"), borderRadius: 8, color: val.trim() ? gold : "#2a2a4a", cursor: val.trim() ? "pointer" : "default", fontFamily: "'Cinzel', serif", fontSize: 11, letterSpacing: 1.5 }}>
          {testing ? "⋯ Verifica in corso…" : "⊕  SALVA E INIZIA"}
        </button>
      </div>
      <p style={{ fontSize: 12, color: textMuted, marginTop: 18, textAlign: "center", lineHeight: 1.7, maxWidth: 300 }}>
        La chiave non lascia mai il tuo dispositivo, eccetto per le chiamate dirette ad Anthropic.
      </p>
    </div>
  );
}

function App() {
  const [section, setSection] = useState("home");
  const [hasKey, setHasKey] = useState(() => !!getApiKey());
  if (!hasKey) return React.createElement(ApiKeyGate, { onSave: () => setHasKey(true) });

  // FIX #10: localStorage persistence per tutti i dati core
  const [dreams, setDreams] = useState(() => lsGet("ind_dreams", []));
  const [shadowJournal, setShadowJournal] = useState(() => lsGet("ind_shadow", []));
  const [myArchetypes, setMyArchetypes] = useState(() => lsGet("ind_archetypes", []));
  const [individuationStage, setIndividuationStage] = useState(() => lsGet("ind_stage", 0));

  useEffect(() => { lsSet("ind_dreams", dreams); }, [dreams]);
  useEffect(() => { lsSet("ind_shadow", shadowJournal); }, [shadowJournal]);
  useEffect(() => { lsSet("ind_archetypes", myArchetypes); }, [myArchetypes]);
  useEffect(() => { lsSet("ind_stage", individuationStage); }, [individuationStage]);

  // UI state — persistente nel root (no reset navigando)
  const [dreamsTab, setDreamsTab] = useState("add");
  const [selectedDream, setSelectedDream] = useState(null);
  const [shadowTab, setShadowTab] = useState("write");
  const [shadowPromptIdx, setShadowPromptIdx] = useState(0);
  const [selectedShadowEntry, setSelectedShadowEntry] = useState(null);
  const [archView, setArchView] = useState("grid");
  const [archDetailId, setArchDetailId] = useState(null);
  const [archGuidance, setArchGuidance] = useState(""); // FIX #4: guidance nel root
  const [archLoading, setArchLoading] = useState(false); // FIX: loading in root so it survives navigation
  const [imagFigure, setImagFigure] = useState(null);
  const [imagMessages, setImagMessages] = useState([]);
  const [imagPhase, setImagPhase] = useState("select"); // FIX #3: phase nel root
  const [indView, setIndView] = useState("map");
  const [quizStep, setQuizStep] = useState(0); // FIX #6: quiz nel root
  const [quizAnswers, setQuizAnswers] = useState([]);

  useEffect(() => {
    const el = document.createElement("style");
    el.textContent = `
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap');
      * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
      ::-webkit-scrollbar { width: 4px; background: #07070f; }
      ::-webkit-scrollbar-thumb { background: #1e1e3a; border-radius: 2px; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    `;
    document.head.appendChild(el);
    return () => document.head.removeChild(el);
  }, []);

  const renderSection = () => {
    const psychicContext = buildPsychicContext(dreams, shadowJournal, myArchetypes, individuationStage);
    switch (section) {
      case "home": return <HomeSection setSection={setSection} dreams={dreams} shadowJournal={shadowJournal} myArchetypes={myArchetypes} individuationStage={individuationStage} />;
      case "dreams": return <DreamsSection dreams={dreams} setDreams={setDreams} tab={dreamsTab} setTab={setDreamsTab} selectedDream={selectedDream} setSelectedDream={setSelectedDream} setSection={setSection} />;
      case "shadow": return <ShadowSection shadowJournal={shadowJournal} setShadowJournal={setShadowJournal} promptIdx={shadowPromptIdx} setPromptIdx={setShadowPromptIdx} tab={shadowTab} setTab={setShadowTab} selectedEntry={selectedShadowEntry} setSelectedEntry={setSelectedShadowEntry} setSection={setSection} psychicContext={psychicContext} />;
      case "archetypes": return <ArchetypesSection myArchetypes={myArchetypes} setMyArchetypes={setMyArchetypes} archView={archView} setArchView={setArchView} detailId={archDetailId} setDetailId={setArchDetailId} guidance={archGuidance} setGuidance={setArchGuidance} archLoading={archLoading} setArchLoading={setArchLoading} psychicContext={psychicContext} />;
      case "imagination": return <ImaginationSection figure={imagFigure} setFigure={setImagFigure} messages={imagMessages} setMessages={setImagMessages} phase={imagPhase} setPhase={setImagPhase} psychicContext={psychicContext} />;
      case "individuation": return <IndividuationSection individuationStage={individuationStage} setIndividuationStage={setIndividuationStage} indView={indView} setIndView={setIndView} quizStep={quizStep} setQuizStep={setQuizStep} quizAnswers={quizAnswers} setQuizAnswers={setQuizAnswers} psychicContext={psychicContext} />;
      default: return null;
    }
  };

  return (
    <div style={{ fontFamily: "'Cormorant Garamond', serif", background: bg, minHeight: "100vh", color: textPrimary, display: "flex", flexDirection: "column", maxWidth: 680, margin: "0 auto" }}>
      {/* Header — FIX #12: colori visibili */}
      <div style={{ padding: "13px 20px", borderBottom: `1px solid ${border}`, display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, background: bg, zIndex: 10 }}>
        <div onClick={() => setSection("home")} style={{ cursor: "pointer" }}>
          <div style={{ fontFamily: "'Cinzel', serif", color: gold, fontSize: 14, letterSpacing: 4, fontWeight: 600 }}>INDIVIDUATIO</div>
          <div style={{ fontSize: 9, color: "#4a4a5a", letterSpacing: 2.5, marginTop: 2 }}>PERCORSO JUNGHIANO</div>
        </div>
        <button onClick={() => { saveApiKey(""); setHasKey(false); }}
          style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#3a3a5a", padding: 4 }} title="Cambia API key">◈</button>
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflowY: "auto" }}>
        {renderSection()}
      </div>

      {/* Bottom Nav — FIX #11: contrasto navInactive molto migliorato */}
      <div style={{ borderTop: `1px solid ${border}`, display: "flex", background: bg, position: "sticky", bottom: 0, zIndex: 10 }}>
        {NAV.map(n => {
          const active = section === n.id;
          return (
            <button key={n.id} onClick={() => setSection(n.id)}
              style={{ flex: 1, padding: "11px 3px 9px", background: "transparent", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, position: "relative" }}>
              {active && <div style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", width: 18, height: 2, background: gold, borderRadius: 1 }} />}
              <span style={{ fontSize: 15, color: active ? gold : navInactive, transition: "color 0.2s" }}>{n.symbol}</span>
              <span style={{ fontSize: 8, letterSpacing: 0.8, fontFamily: "'Cinzel', serif", color: active ? gold : navInactive, transition: "color 0.2s" }}>{n.label.toUpperCase()}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
